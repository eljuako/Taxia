<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxia - Tu Asistente Fiscal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Estilos básicos para el manejo de estados */
        #auth-container {
            display: flex;
            align-items: center;
            min-width: 120px; /* Evita saltos de ancho */
        }
        .hidden { display: none !important; }
        .invisible { opacity: 0; }
        .fade-in { opacity: 1; transition: opacity 0.3s ease-in; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Taxia</div>
        <div id="auth-container" class="invisible">
            <a href="login.html" id="login-btn" class="nav-link">Iniciar Sesión</a>
            <a href="perfil.html" id="profile-btn" class="nav-link hidden">Mi Perfil</a>
        </div>
    </nav>

    <main>
        <h1>Bienvenido a Taxia</h1>
        </main>

    <script>
        // 1. Configuración de Claves (Reemplaza con tus valores reales)
        const SUPABASE_URL = 'TU_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'TU_SUPABASE_ANON_KEY';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Referencias DOM
        const authContainer = document.getElementById('auth-container');
        const loginBtn = document.getElementById('login-btn');
        const profileBtn = document.getElementById('profile-btn');

        // 2. Función para actualizar la Interfaz y Dify
        function handleAuthChange(session) {
            if (session) {
                // Usuario logueado
                loginBtn.classList.add('hidden');
                profileBtn.classList.remove('hidden');
                
                // Si quieres que Dify sepa quién es el usuario
                if (window.difyChatConfig) {
                    window.difyChatConfig.user = session.user.id;
                }
            } else {
                // Usuario no logueado
                loginBtn.classList.remove('hidden');
                profileBtn.classList.add('hidden');
            }
            
            // Mostramos el contenedor con una transición suave
            authContainer.classList.remove('invisible');
            authContainer.classList.add('fade-in');
        }

        // 3. Verificación de sesión inicial
        supabase.auth.getSession().then(({ data: { session } }) => {
            handleAuthChange(session);
        });

        // 4. Escuchar cambios de estado (Login/Logout)
        supabase.auth.onAuthStateChange((_event, session) => {
            handleAuthChange(session);
        });
    </script>

    <script>
        window.difyChatConfig = {
            token: 'TU_TOKEN_DE_DIFY',
            baseUrl: 'https://api.dify.ai', // O tu URL personalizada
            user: '', // Se llenará dinámicamente con el ID de Supabase
        };
    </script>
    <script
        src="https://udify.app/embed.min.js"
        id="TU_ID_DE_EMBED"
        defer>
    </script>

</body>
</html>
